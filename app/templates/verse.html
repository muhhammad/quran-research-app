{% extends "base.html" %}

{% block content %}

<h2>Verse Analysis</h2>

<form method="post">

Surah
<input name="surah">

Ayah
<input name="ayah">

<button type="submit">Analyze</button>

</form>

{% if result %}

<div class="result">

<div class="verse">
{{ result.text }}
</div>

<p>Words: {{ result.words }}</p>

<p>Letters: {{ result.letters }}</p>

</div>

{% endif %}

{% endblock %}
