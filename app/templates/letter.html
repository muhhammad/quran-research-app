{% extends "base.html" %}

{% block content %}

<h2>Letter Analysis</h2>

<form method="post">

Letter
<input name="letter">

Surah
<input name="surah">

<button type="submit">Analyze</button>

</form>

{% if result %}

<div class="result">

<p>Plain count: {{ result.plain }}</p>

<p>Uthmani count: {{ result.uthmani }}</p>

<p>Plain divisible by 19: {{ result.plain_19 }}</p>

<p>Uthmani divisible by 19: {{ result.uthmani_19 }}</p>

</div>

{% endif %}

{% endblock %}
