{% extends "base.html" %}

{% block content %}

<h2>Letter Analysis</h2>

<form method="post">

<label>Letter:</label>
<select name="letter">
{% for name, arabic in letters.items() %}
<option value="{{ name }}">{{ arabic }} ({{ name }})</option>
{% endfor %}
</select>

<label>Surah:</label>
<select name="surah">
{% for num, name in surahs.items() %}
<option value="{{ num }}">
    {{ num }} - {{ name }}
</option>
{% endfor %}
</select>

<button type="submit">Analyze</button>

</form>

{% if result %}
<hr>

<h3>Result</h3>

<p>Plain: {{ result.plain }}</p>
<p>Uthmani: {{ result.uthmani }}</p>

<p>Divisible by 19:</p>
<ul>
<li>Plain: {{ result.plain_19 }}</li>
<li>Uthmani: {{ result.uthmani_19 }}</li>
</ul>

{% endif %}

{% endblock %}
