{% extends "base.html" %}

{% block content %}

<h2>Verse Analysis</h2>

<form method="post">

<label>Surah:</label>
<input type="number" name="surah" min="1" max="114" required>

<label>Ayah:</label>
<input type="number" name="ayah" required>

<button type="submit">Analyze</button>

</form>

{% if result %}
<hr>

<h3>Result</h3>

<p class="arabic">{{ result.text }}</p>

<p><strong>Words:</strong> {{ result.words }}</p>
<p><strong>Letters:</strong> {{ result.letters }}</p>

{% endif %}

{% endblock %}
