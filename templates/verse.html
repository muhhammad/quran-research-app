{% extends "base.html" %}

{% block content %}

<h2>Verse Analysis</h2>

<form method="post">

<label>Surah:</label>
<select name="surah">
{% for num, name in surahs.items() %}
<option value="{{ num }}">
    {{ num }} - {{ name }}
</option>
{% endfor %}
</select>

<label>Ayah:</label>
<select name="ayah" id="ayah-select"></select>

<button type="submit">Analyze</button>

</form>

{% if result %}
<hr>

<h3>Result</h3>

<p class="arabic">{{ result.text }}</p>

<p><strong>Words:</strong> {{ result.words }}</p>
<p><strong>Letters:</strong> {{ result.letters }}</p>

{% endif %}

<!-- ✅ MOVE SCRIPT HERE -->
<script>
const ayahCounts = {{ ayah_counts | tojson }};
const surahSelect = document.querySelector("select[name='surah']");
const ayahSelect = document.getElementById("ayah-select");

function updateAyahOptions() {
    const surah = surahSelect.value;
    const maxAyah = ayahCounts[surah];

    ayahSelect.innerHTML = "";

    for (let i = 1; i <= maxAyah; i++) {
        const option = document.createElement("option");
        option.value = i;
        option.text = i;
        ayahSelect.appendChild(option);
    }
}

// Run on load
updateAyahOptions();

// Run when surah changes
surahSelect.addEventListener("change", updateAyahOptions);
</script>

{% endblock %}
