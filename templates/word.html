{% extends "base.html" %}

{% block content %}

<h2>Word Search</h2>

<form method="post">

<input list="wordlist" name="word" placeholder="Enter Arabic word" required>

<datalist id="wordlist">
<option value="الله">
<option value="رب">
<option value="الرحمن">
<option value="الرحيم">
</datalist>

<button type="submit">Search</button>

</form>

{% if results %}
<hr>

<h3>Results ({{ total }})</h3>

<ul>
{% for r in results %}
<li>{{ r }}</li>
{% endfor %}
</ul>

{% endif %}

{% endblock %}
